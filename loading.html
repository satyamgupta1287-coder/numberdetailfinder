<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Processing...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  color:#e0e0e0;
  font-family:'Poppins', sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.container{
  text-align:center;
  padding:40px;
  max-width:400px;
  animation:slideUp 0.8s ease-out;
}

@keyframes slideUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

h1{
  font-size:36px;
  background:linear-gradient(135deg, #64c8ff, #7dd5ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:30px;
  font-weight:700;
}

.loader-wrapper{
  margin:40px 0;
}

/* ANIMATED SPINNER */
.spinner{
  width:60px;
  height:60px;
  margin:0 auto 30px;
  border:4px solid rgba(100, 200, 255, 0.2);
  border-top:4px solid #64c8ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

.status-text{
  font-size:18px;
  font-weight:500;
  margin-bottom:30px;
  letter-spacing:0.5px;
  color:#64c8ff;
}

.dots{
  display:inline-block;
}

.dot{
  display:inline-block;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#64c8ff;
  margin:0 3px;
  animation:bounce 1.4s infinite ease-in-out;
}

.dot:nth-child(1){
  animation-delay:-0.32s;
}

.dot:nth-child(2){
  animation-delay:-0.16s;
}

@keyframes bounce{
  0%, 80%, 100%{
    transform:scale(0.8);
    opacity:0.5;
  }
  40%{
    transform:scale(1);
    opacity:1;
  }
}

/* PROGRESS BAR */
.progress-container{
  width:100%;
  height:6px;
  background:rgba(100, 200, 255, 0.1);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:20px;
}

.progress-bar{
  height:100%;
  background:linear-gradient(90deg, #64c8ff, #5bb8ff);
  width:0%;
  animation:none;
  border-radius:10px;
  box-shadow:0 0 15px rgba(100, 200, 255, 0.5);
}

.percentage{
  font-size:14px;
  color:#aaa;
  margin-top:15px;
  font-weight:500;
}

.scan-line{
  position:fixed;
  width:100%;
  height:2px;
  background:linear-gradient(90deg, transparent, #64c8ff, transparent);
  top:50%;
  animation:scan 2s infinite linear;
  opacity:0.5;
}

@keyframes scan{
  0%{top:0;}
  50%{top:50%;}
  100%{top:100%;}
}

.footer{
  position:absolute;
  bottom:20px;
  font-size:12px;
  color:#777;
  text-align:center;
}

@media(max-width:600px){
  .container{
    padding:30px 20px;
  }

  h1{
    font-size:28px;
  }
}
</style>
</head>

<body>

<div class="scan-line"></div>

<div class="container">
  <h1>⚡ INITIALIZING</h1>

  <div class="loader-wrapper">
    <div class="spinner"></div>
    
    <div class="status-text">
      Processing
      <span class="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </span>
    </div>

    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>

    <div class="percentage">
      <span id="percentage">0</span>%
    </div>
  </div>
</div>

<div class="footer">
  Educational Purpose Only
</div>

<script>

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, duration){
  try{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    gain.gain.value = 0.05;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }catch(e){}
}

const params = new URLSearchParams(window.location.search);
const num = params.get("num");

let progressBar = document.querySelector(".progress-bar");
let percentageText = document.getElementById("percentage");
let progress = 0;

let interval = setInterval(()=>{
  progress += Math.random() * 8;
  if(progress > 100) progress = 100;

  progressBar.style.width = progress + "%";
  percentageText.textContent = Math.floor(progress);

  beep(400 + Math.random()*300, 0.08);

  if(progress >= 100){
    clearInterval(interval);

    setTimeout(()=>{
      window.location.href = "result.html?num=" + encodeURIComponent(num);
    }, 800);
  }
}, 150);

</script>

</body>
</html>
