<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRACE_SYS :: PROCESSING</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#010a01;
  color:#00ff41;
  font-family:'Share Tech Mono', monospace;
  min-height:100vh;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  overflow:hidden;
  background-image:repeating-linear-gradient(
    0deg,transparent,transparent 2px,
    rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px
  );
}

body::after {
  content:'';
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.9) 100%);
  pointer-events:none; z-index:0;
}

#mc {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  z-index:0; opacity:0.07; pointer-events:none;
}

/* ── PANEL ── */
.panel {
  position:relative; z-index:10;
  width:92%; max-width:460px;
  border:1px solid rgba(0,255,65,0.3);
  background:rgba(1,10,1,0.9);
  animation:boxIn 0.5s ease-out both;
}

@keyframes boxIn {
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.panel::before {
  content:'';
  position:absolute; top:0; left:0;
  width:20px; height:20px;
  border-top:2px solid #00ff41; border-left:2px solid #00ff41;
  box-shadow:0 0 8px #00ff41;
}
.panel::after {
  content:'';
  position:absolute; bottom:0; right:0;
  width:20px; height:20px;
  border-bottom:2px solid #00ff41; border-right:2px solid #00ff41;
  box-shadow:0 0 8px #00ff41;
}

.scan-beam {
  position:absolute; top:0; left:-100%; width:50%; height:1px;
  background:linear-gradient(90deg,transparent,#00ff41,transparent);
  animation:beam 3s linear infinite; z-index:1;
}
@keyframes beam{0%{left:-100%}100%{left:200%}}

/* header */
.phead {
  padding:12px 18px;
  border-bottom:1px solid rgba(0,255,65,0.2);
  background:rgba(0,255,65,0.04);
  display:flex; align-items:center; justify-content:space-between;
}
.phead-title {
  font-family:'Orbitron', monospace;
  font-size:10px; font-weight:700;
  letter-spacing:3px; color:#00ff41;
  text-shadow:0 0 8px #00ff41;
}
.pdots span {
  display:inline-block; width:7px; height:7px;
  border-radius:50%; background:#00ff41;
  margin-left:5px; opacity:0.35;
}
.pdots span:first-child{opacity:0.9;animation:blink 1s infinite;}
.pdots span:nth-child(2){animation:blink 1s 0.33s infinite;}
.pdots span:nth-child(3){animation:blink 1s 0.66s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.1}}

/* body */
.pbody { padding:34px 28px; text-align:center; }

.sys-tag {
  font-size:9px; letter-spacing:4px;
  color:#2a5a2a; margin-bottom:14px;
}

h1 {
  font-family:'Orbitron', monospace;
  font-size:clamp(18px,5vw,32px);
  font-weight:900; letter-spacing:5px;
  color:#00ff41;
  text-shadow:0 0 10px #00ff41,0 0 28px rgba(0,255,65,0.5);
  margin-bottom:28px;
  animation:glitch 4s infinite;
}
@keyframes glitch{
  0%,85%,100%{text-shadow:0 0 10px #00ff41,0 0 28px rgba(0,255,65,0.5);transform:none;}
  86%{text-shadow:-2px 0 #ff0080,2px 0 #00d4ff;transform:translate(-1px);}
  87%{text-shadow:2px 0 #ff0080,-2px 0 #00d4ff;transform:translate(1px);}
  88%{text-shadow:0 0 10px #00ff41,0 0 28px rgba(0,255,65,0.5);transform:none;}
}

/* spinner */
.spinner-wrap { margin-bottom:28px; position:relative; display:inline-block; }

.ring {
  width:72px; height:72px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}

.ring::before {
  content:'';
  position:absolute; top:0; left:0; right:0; bottom:0;
  border-radius:50%;
  border:2px solid rgba(0,255,65,0.1);
  border-top-color:#00ff41;
  box-shadow:0 0 14px rgba(0,255,65,0.4);
  animation:spin 0.9s linear infinite;
}

.ring::after {
  content:'';
  position:absolute; top:6px; left:6px; right:6px; bottom:6px;
  border-radius:50%;
  border:1px solid rgba(0,212,255,0.2);
  border-bottom-color:#00d4ff;
  box-shadow:0 0 10px rgba(0,212,255,0.3);
  animation:spin 1.4s linear infinite reverse;
}

.ring-icon {
  font-size:22px; z-index:1;
  animation:iconPulse 1.5s ease-in-out infinite;
}
@keyframes iconPulse{0%,100%{opacity:0.7;}50%{opacity:1;}}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

/* status text */
.status-txt {
  font-family:'Orbitron', monospace;
  font-size:11px; letter-spacing:3px;
  color:#00d4ff; text-shadow:0 0 8px #00d4ff;
  margin-bottom:22px;
  min-height:20px;
}

/* progress */
.prog-lbl {
  font-size:10px; letter-spacing:2px;
  color:#2a5a2a; margin-bottom:8px;
  display:flex; justify-content:space-between;
}

.prog-bar {
  width:100%; height:3px;
  background:rgba(0,255,65,0.1);
  margin-bottom:8px; position:relative; overflow:visible;
}

.prog-fill {
  height:100%;
  background:linear-gradient(90deg,#00d4ff,#00ff41);
  box-shadow:0 0 8px #00ff41;
  width:0%; transition:width 0.2s ease-out;
  position:relative;
}

.prog-fill::after {
  content:'';
  position:absolute; right:0; top:-3px;
  width:8px; height:8px; border-radius:50%;
  background:#00ff41; box-shadow:0 0 8px #00ff41;
}

.prog-pct {
  font-family:'Orbitron', monospace;
  font-size:22px; font-weight:900;
  color:#00ff41; text-shadow:0 0 12px #00ff41;
  margin-top:10px;
}

/* log lines */
.log-area {
  margin-top:20px; text-align:left;
  border-top:1px solid rgba(0,255,65,0.1);
  padding-top:14px;
  max-height:110px; overflow:hidden;
  font-size:11px; line-height:1.8;
  color:#2a5a2a;
}

.log-line { animation:fadeIn 0.3s ease-out both; }
.log-line.active { color:#00ff41; }
.log-line.done   { color:#2a5a2a; }

@keyframes fadeIn{from{opacity:0;transform:translateX(-5px);}to{opacity:1;transform:translateX(0);}}

.footer {
  position:fixed; bottom:14px;
  font-size:10px; color:#2a5a2a;
  letter-spacing:2px; z-index:10;
}
</style>
</head>
<body>

<canvas id="mc"></canvas>

<div class="panel">
  <div class="scan-beam"></div>

  <div class="phead">
    <div class="phead-title">// TRACE_PROCESSING</div>
    <div class="pdots"><span></span><span></span><span></span></div>
  </div>

  <div class="pbody">
    <div class="sys-tag">NEURAL-TRACE SYSTEM v4.2 // ACTIVE</div>
    <h1>INITIALIZING</h1>

    <div class="spinner-wrap">
      <div class="ring">
        <span class="ring-icon">⚡</span>
      </div>
    </div>

    <div class="status-txt" id="statusTxt">BOOTING SYSTEM...</div>

    <div class="prog-lbl">
      <span>TRACE PROGRESS</span>
      <span id="pctLbl">0%</span>
    </div>
    <div class="prog-bar">
      <div class="prog-fill" id="progFill"></div>
    </div>
    <div class="prog-pct" id="pctBig">0%</div>

    <div class="log-area" id="logArea"></div>
  </div>
</div>

<div class="footer">EDUCATIONAL PURPOSE ONLY</div>

<script>
/* matrix */
var mc=document.getElementById('mc'),ctx=mc.getContext('2d');
function rsz(){mc.width=window.innerWidth;mc.height=window.innerHeight;}
rsz(); window.addEventListener('resize',rsz);
var ch='アイウエオ01001101TRACE',dp=[];
function iDp(){dp=Array(Math.floor(mc.width/14)).fill(1);}
iDp(); window.addEventListener('resize',iDp);
setInterval(function(){
  ctx.fillStyle='rgba(1,10,1,0.05)';ctx.fillRect(0,0,mc.width,mc.height);
  ctx.font='13px monospace';
  for(var i=0;i<dp.length;i++){
    ctx.fillStyle=Math.random()>0.9?'#00d4ff':'#00ff41';
    ctx.globalAlpha=Math.random()*0.5+0.3;
    ctx.fillText(ch[Math.floor(Math.random()*ch.length)],i*14,dp[i]*14);
    if(dp[i]*14>mc.height&&Math.random()>0.975)dp[i]=0;
    dp[i]++;
  }
  ctx.globalAlpha=1;
},40);

/* beep */
var aC=new(window.AudioContext||window.webkitAudioContext)();
function beep(f,d){
  try{
    var o=aC.createOscillator(),g=aC.createGain();
    o.frequency.value=f; g.gain.value=0.04;
    o.connect(g); g.connect(aC.destination);
    o.start(); o.stop(aC.currentTime+d);
  }catch(e){}
}

/* log */
var logArea=document.getElementById('logArea');
function addLog(txt, active){
  var d=document.createElement('div');
  d.className='log-line '+(active?'active':'done');
  d.textContent='> '+txt;
  logArea.appendChild(d);
  logArea.scrollTop=logArea.scrollHeight;

  // mark previous as done
  var lines=logArea.querySelectorAll('.log-line.active');
  for(var i=0;i<lines.length-1;i++) lines[i].className='log-line done';
}

/* params */
var params=new URLSearchParams(window.location.search);
var num=params.get('num');

var pct=0;
var stages=[
  {pct:12,  status:'BOOTING NEURAL INTERFACE...', log:'System boot sequence initiated'},
  {pct:28,  status:'VALIDATING TARGET...',         log:'Target number: '+num},
  {pct:45,  status:'CONNECTING TO DATABASE...',    log:'Encrypted tunnel established'},
  {pct:60,  status:'QUERYING RECORDS...',          log:'Querying distributed DB nodes'},
  {pct:75,  status:'DECRYPTING DATA...',           log:'Decryption keys applied'},
  {pct:88,  status:'PARSING RESPONSE...',          log:'Parsing data fields'},
  {pct:96,  status:'GEOLOCATING TARGET...',        log:'Pinging geolocation servers'},
  {pct:100, status:'TRACE COMPLETE ✔',             log:'All fields extracted successfully'},
];

var si=0;
var fill=document.getElementById('progFill');
var pctLbl=document.getElementById('pctLbl');
var pctBig=document.getElementById('pctBig');
var statusTxt=document.getElementById('statusTxt');

function runStage(){
  if(si>=stages.length){
    // redirect
    setTimeout(function(){
      window.location.href='result.html?num='+encodeURIComponent(num);
    }, 600);
    return;
  }

  var s=stages[si];
  si++;

  // animate pct
  var from=pct;
  var to=s.pct;
  var step=(to-from)/20;
  var cur=from;
  var tid=setInterval(function(){
    cur+=step;
    if(cur>=to){ cur=to; clearInterval(tid); }
    fill.style.width=cur+'%';
    pctLbl.textContent=Math.floor(cur)+'%';
    pctBig.textContent=Math.floor(cur)+'%';
    beep(300+cur*3, 0.04);
  },18);
  pct=to;

  statusTxt.textContent=s.status;
  addLog(s.log, true);

  // next stage delay
  var delay = si===stages.length ? 1200 : 400+Math.random()*300;
  setTimeout(runStage, delay);
}

// start
setTimeout(function(){
  addLog('NEURAL-TRACE SYSTEM ONLINE', true);
  setTimeout(runStage, 400);
}, 300);
</script>
</body>
</html>
