<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Processing...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#000;
  color:#00ffcc;
  font-family:monospace;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  height:100vh;
}

/* TITLE */
h1{
  text-shadow:0 0 20px #00ffcc;
}

/* PROGRESS BAR */
#barBox{
  width:80%;
  max-width:300px;
  height:10px;
  background:#001100;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

#bar{
  width:0%;
  height:100%;
  background:#00ffcc;
}

/* DOTS ANIMATION */
.dots::after{
  content:'';
  animation:dots 1s infinite;
}

@keyframes dots{
  0%{content:'';}
  33%{content:'.';}
  66%{content:'..';}
  100%{content:'...';}
}

/* FOOTER */
.footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<h1>⚡ INITIALIZING TRACE ⚡</h1>

<div class="dots">Processing</div>

<div id="barBox">
  <div id="bar"></div>
</div>

<div class="footer">
This is for educational purpose only. Not to harm anyone.<br>
Developed by Satyam Gupta ⚡
</div>

<script>

// 🔊 SOUND SYSTEM
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, duration){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  gain.gain.value = 0.05;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

// GET NUMBER
const params = new URLSearchParams(window.location.search);
const num = params.get("num");

// PROGRESS LOGIC
let bar = document.getElementById("bar");
let progress = 0;

let interval = setInterval(()=>{
  progress += 4;
  bar.style.width = progress + "%";

  // 🔊 loading sound pulse
  beep(500 + Math.random()*200, 0.05);

  if(progress >= 100){
    clearInterval(interval);

    setTimeout(()=>{
      window.location.href = "result.html?num=" + num;
    }, 500);
  }

},120);

</script>

</body>
</html>
