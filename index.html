<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Detail Finder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #282c34;
            color: #ffffff;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            margin-top: 50px;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            animation: fadeIn 1s;
        }
        input[type='text'] {
            padding: 10px;
            margin: 20px;
            border: 2px solid #61dafb;
            border-radius: 5px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type='text']:focus {
            border-color: #21a1f1;
        }
        button {
            padding: 10px 20px;
            background-color: #61dafb;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: #282c34;
            font-size: 1em;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #21a1f1;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Find Detailed Information About a Number</h1>
        <input type="text" placeholder="Enter a number..." id="numberInput" />
        <button id="findButton">Find Details</button>
    </div>
    <script>
        document.getElementById('findButton').addEventListener('click', function() {
            const number = document.getElementById('numberInput').value;
            alert('Finding details for: ' + number);
            // Add actual functionality here
        });
    </script>
</body>
</html>
