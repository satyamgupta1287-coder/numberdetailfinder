<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Trace X - Number Lookup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  color:#e0e0e0;
  font-family:'Poppins', sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

/* ANIMATED BACKGROUND */
body::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(100,200,255,0.05)" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,186.7C384,213,480,235,576,224C672,213,768,171,864,160C960,149,1056,171,1152,176C1248,181,1344,171,1392,165.3L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
  background-size:cover;
  animation:wave 15s linear infinite;
  z-index:0;
}

@keyframes wave{
  0%{transform:translateX(0);}
  100%{transform:translateX(100%);}
}

.container{
  position:relative;
  z-index:1;
  text-align:center;
  padding:40px;
  max-width:500px;
  backdrop-filter:blur(10px);
  background:rgba(15, 12, 41, 0.7);
  border-radius:20px;
  border:1px solid rgba(100, 200, 255, 0.2);
  box-shadow:0 20px 60px rgba(0, 0, 0, 0.4);
  animation:slideUp 0.8s ease-out;
}

@keyframes slideUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.brand{
  font-size:14px;
  color:#64c8ff;
  font-weight:600;
  letter-spacing:2px;
  margin-bottom:20px;
  text-transform:uppercase;
  opacity:0.8;
  animation:fadeIn 1s ease-out 0.2s both;
}

h1{
  font-size:42px;
  font-weight:700;
  background:linear-gradient(135deg, #64c8ff, #7dd5ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:10px;
  text-shadow:0 0 30px rgba(100, 200, 255, 0.3);
  animation:fadeIn 1s ease-out 0.4s both;
}

.subtitle{
  font-size:14px;
  color:#aaa;
  margin-bottom:30px;
  font-weight:300;
  letter-spacing:0.5px;
  animation:fadeIn 1s ease-out 0.6s both;
}

.input-group{
  position:relative;
  margin-bottom:25px;
  animation:fadeIn 1s ease-out 0.8s both;
}

input{
  width:100%;
  padding:16px 20px;
  background:rgba(255, 255, 255, 0.05);
  border:2px solid rgba(100, 200, 255, 0.3);
  color:#e0e0e0;
  border-radius:12px;
  font-family:'Poppins', sans-serif;
  font-size:16px;
  transition:all 0.3s ease;
  outline:none;
}

input::placeholder{
  color:#888;
}

input:focus{
  background:rgba(255, 255, 255, 0.08);
  border-color:#64c8ff;
  box-shadow:0 0 20px rgba(100, 200, 255, 0.2);
}

button{
  width:100%;
  padding:15px 30px;
  background:linear-gradient(135deg, #64c8ff, #5bb8ff);
  color:#fff;
  border:none;
  border-radius:12px;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  transition:all 0.3s ease;
  position:relative;
  overflow:hidden;
  font-family:'Poppins', sans-serif;
  letter-spacing:0.5px;
  animation:fadeIn 1s ease-out 1s both;
  box-shadow:0 10px 30px rgba(100, 200, 255, 0.3);
}

button::before{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:rgba(255, 255, 255, 0.2);
  transition:left 0.5s ease;
  z-index:-1;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 40px rgba(100, 200, 255, 0.4);
}

button:hover::before{
  left:100%;
}

button:active{
  transform:translateY(-1px);
}

.features{
  margin-top:35px;
  padding-top:35px;
  border-top:1px solid rgba(100, 200, 255, 0.1);
  animation:fadeIn 1s ease-out 1.2s both;
}

.feature-item{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
  font-size:14px;
  color:#aaa;
}

.feature-icon{
  color:#64c8ff;
  font-weight:bold;
  min-width:20px;
}

.footer{
  position:absolute;
  bottom:20px;
  font-size:12px;
  color:#777;
  opacity:0.7;
  animation:fadeIn 1s ease-out 1.4s both;
}

.footer a{
  color:#64c8ff;
  text-decoration:none;
  transition:color 0.3s ease;
}

.footer a:hover{
  color:#7dd5ff;
}

@keyframes fadeIn{
  from{
    opacity:0;
  }
  to{
    opacity:1;
  }
}

@media(max-width:600px){
  .container{
    padding:30px 20px;
    margin:20px;
  }
  
  h1{
    font-size:32px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="brand">🔐 CYBER TRACE X</div>
  <h1>⚡ TRACE</h1>
  <p class="subtitle">Fast & Secure Number Lookup</p>

  <div class="input-group">
    <input type="tel" id="number" placeholder="Enter phone number..." maxlength="15">
  </div>

  <button onclick="go()">START TRACE</button>

  <div class="features">
    <div class="feature-item">
      <span class="feature-icon">✓</span>
      <span>Instant Results</span>
    </div>
    <div class="feature-item">
      <span class="feature-icon">✓</span>
      <span>Secure & Encrypted</span>
    </div>
    <div class="feature-item">
      <span class="feature-icon">✓</span>
      <span>Real-time Location</span>
    </div>
  </div>
</div>

<div class="footer">
  Educational Purpose Only | Made by <a href="#">Satyam Gupta</a>
</div>

<script>
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration){
  try{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    gain.gain.value = 0.1;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }catch(e){}
}

function clickSound(){
  playSound(800, 0.1);
}

function errorSound(){
  playSound(300, 0.2);
}

function go(){
  let num = document.getElementById("number").value.trim();

  if(!num || num.length < 10){
    errorSound();
    alert("Please enter a valid phone number");
    return;
  }

  clickSound();
  document.querySelector("button").style.opacity = "0.7";
  
  setTimeout(()=>{
    window.location.href = "loading.html?num=" + encodeURIComponent(num);
  }, 200);
}

document.getElementById("number").addEventListener("keypress", function(e){
  if(e.key === "Enter") go();
});
</script>

</body>
</html>
