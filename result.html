<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRACE RESULT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#010a01;
  color:#00ff41;
  font-family:monospace;
  padding:20px;
}

h2{margin-bottom:20px;}

#terminal{margin-bottom:20px;}

.data-field{
  margin:8px 0;
  padding:10px;
  border-left:2px solid #00ff41;
  word-break:break-word;
}
</style>
</head>

<body>

<h2>TRACE RESULT</h2>

<div id="terminal"></div>
<div id="dataDisplay"></div>

<script>
const params = new URLSearchParams(window.location.search);
const num = params.get('num');

const terminal = document.getElementById("terminal");
const dataDisplay = document.getElementById("dataDisplay");

function log(text){
  const div = document.createElement("div");
  div.textContent = "> " + text;
  terminal.appendChild(div);
}

function addField(label,value){
  const div = document.createElement("div");
  div.className = "data-field";
  div.innerHTML = "<b>"+label+":</b> "+(value || "N/A");
  dataDisplay.appendChild(div);
}

// 🔥 FULL DATA RENDER (recursive)
function showAllData(data){
  dataDisplay.innerHTML = "";

  function render(obj, prefix=""){
    for (let key in obj){
      const value = obj[key];

      if (typeof value === "object" && value !== null){
        render(value, prefix + key + " → ");
      } else {
        addField((prefix + key).toUpperCase(), value);
      }
    }
  }

  render(data);
}

async function start(){

  if(!num){
    log("No number provided");
    return;
  }

  log("Target: " + num);
  log("Connecting to server...");

  try{

    const res = await fetch(`/api/getdata?num=${encodeURIComponent(num)}`);

    const json = await res.json();
    console.log("API:", json);

    // 🔥 API error handling
    if (json.status === false){
      log("API: " + json.message);
      return;
    }

    // 🔥 data extract
    let data = null;

    if (json.result && Array.isArray(json.result)) data = json.result[0];
    else if (json.result) data = json.result;
    else data = json;

    if(!data){
      log("No data found");
      return;
    }

    log("Data received ✔");

    // 🔥 show ALL data
    showAllData(data);

    log("Completed ✔");

  }catch(e){
    log("Error: " + e.message);
  }
}

start();
</script>

</body>
</html>
