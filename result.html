<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trace Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  color:#e0e0e0;
  font-family:'Poppins', sans-serif;
  min-height:100vh;
  padding:40px 20px;
}

.container{
  max-width:900px;
  margin:0 auto;
  animation:slideUp 0.8s ease-out;
}

@keyframes slideUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.header{
  text-align:center;
  margin-bottom:40px;
}

h1{
  font-size:40px;
  background:linear-gradient(135deg, #64c8ff, #7dd5ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:10px;
  font-weight:700;
}

.success-badge{
  display:inline-block;
  background:linear-gradient(135deg, rgba(100, 200, 255, 0.2), rgba(100, 200, 255, 0.1));
  border:1px solid rgba(100, 200, 255, 0.3);
  padding:8px 16px;
  border-radius:20px;
  font-size:12px;
  color:#64c8ff;
  font-weight:600;
  letter-spacing:1px;
  margin-top:10px;
}

.content-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
  margin-bottom:30px;
}

.terminal-card{
  backdrop-filter:blur(10px);
  background:rgba(15, 12, 41, 0.6);
  border:1px solid rgba(100, 200, 255, 0.2);
  border-radius:15px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0, 0, 0, 0.3);
  animation:slideUp 0.8s ease-out 0.2s both;
}

.terminal-card:nth-child(2){
  animation-delay:0.4s;
}

.card-title{
  font-size:14px;
  font-weight:600;
  color:#64c8ff;
  letter-spacing:1px;
  margin-bottom:15px;
  text-transform:uppercase;
  opacity:0.8;
}

#terminal{
  font-family:'Space Mono', monospace;
  font-size:13px;
  line-height:1.8;
  color:#64c8ff;
  max-height:350px;
  overflow-y:auto;
  padding-right:10px;
  min-height:200px;
}

#terminal::-webkit-scrollbar{
  width:6px;
}

#terminal::-webkit-scrollbar-track{
  background:rgba(100, 200, 255, 0.1);
  border-radius:10px;
}

#terminal::-webkit-scrollbar-thumb{
  background:rgba(100, 200, 255, 0.3);
  border-radius:10px;
}

#terminal::-webkit-scrollbar-thumb:hover{
  background:rgba(100, 200, 255, 0.5);
}

.output-line{
  display:block;
  margin:5px 0;
  animation:fadeInLine 0.5s ease-out forwards;
  opacity:0;
}

@keyframes fadeInLine{
  from{
    opacity:0;
    transform:translateX(-10px);
  }
  to{
    opacity:1;
    transform:translateX(0);
  }
}

.data-field{
  margin-bottom:15px;
  padding:12px;
  background:rgba(100, 200, 255, 0.05);
  border-left:3px solid #64c8ff;
  border-radius:5px;
  font-size:14px;
  line-height:1.6;
}

.data-label{
  color:#64c8ff;
  font-weight:600;
  font-size:12px;
  letter-spacing:0.5px;
  opacity:0.8;
  margin-bottom:3px;
}

.data-value{
  color:#e0e0e0;
  word-break:break-word;
}

#mapBox{
  grid-column:1/-1;
  backdrop-filter:blur(10px);
  background:rgba(15, 12, 41, 0.6);
  border:1px solid rgba(100, 200, 255, 0.2);
  border-radius:15px;
  padding:25px;
  overflow:hidden;
  animation:slideUp 0.8s ease-out 0.6s both;
}

#mapBox iframe{
  border-radius:10px;
  border:1px solid rgba(100, 200, 255, 0.2);
}

.footer{
  text-align:center;
  margin-top:40px;
  padding-top:30px;
  border-top:1px solid rgba(100, 200, 255, 0.1);
  font-size:12px;
  color:#777;
}

.back-btn{
  display:inline-block;
  margin-top:20px;
  padding:10px 20px;
  background:rgba(100, 200, 255, 0.1);
  border:1px solid rgba(100, 200, 255, 0.3);
  color:#64c8ff;
  border-radius:8px;
  text-decoration:none;
  font-size:13px;
  transition:all 0.3s ease;
  font-weight:500;
  cursor:pointer;
}

.back-btn:hover{
  background:rgba(100, 200, 255, 0.2);
  border-color:#64c8ff;
}

@media(max-width:768px){
  .content-grid{
    grid-template-columns:1fr;
  }

  h1{
    font-size:28px;
  }

  #terminal{
    max-height:250px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>⚡ TRACE RESULTS</h1>
    <div class="success-badge">✓ RESULTS FOUND</div>
  </div>

  <div class="content-grid">
    <div class="terminal-card">
      <div class="card-title">📊 Trace Data</div>
      <div id="terminal">> Initializing trace...</div>
    </div>

    <div class="terminal-card">
      <div class="card-title">📋 Extracted Information</div>
      <div id="dataDisplay"></div>
    </div>

    <div id="mapBox"></div>
  </div>

  <div class="footer">
    <p>Educational Purpose Only | Not to harm anyone</p>
    <p style="margin-top:10px;font-size:11px;opacity:0.6;">Made with ⚡ by Satyam Gupta</p>
    <button class="back-btn" onclick="window.location.href='index.html'">← Back to Home</button>
  </div>
</div>

<audio id="successAudio" src="success.mp3"></audio>

<script>

async function type(text, isTerminal = true){
  const term = document.getElementById("terminal");
  const display = document.getElementById("dataDisplay");

  let color = "#64c8ff";
  
  if(text.includes("Name") || text.includes("Father") || text.includes("Number")) color = "#7dd5ff";
  if(text.includes("ID")) color = "#ff6b9d";
  if(text.includes("Address") || text.includes("Circle")) color = "#a8dadc";
  if(text.includes(">")) color = "#64c8ff";

  if(isTerminal){
    const line = document.createElement("span");
    line.className = "output-line";
    line.style.color = color;
    line.textContent = text;
    term.appendChild(line);
    term.scrollTop = term.scrollHeight;
  }

  await new Promise(r => setTimeout(r, 50));
}

function addDataField(label, value){
  const display = document.getElementById("dataDisplay");
  const field = document.createElement("div");
  field.className = "data-field";
  field.style.animation = "fadeInLine 0.5s ease-out forwards";
  field.innerHTML = `
    <div class="data-label">${label}</div>
    <div class="data-value">${value || "N/A"}</div>
  `;
  display.appendChild(field);
}

function playFinalSound(){
  try{
    let audio = document.getElementById("successAudio");
    audio.currentTime = 0;
    audio.play().catch(()=>{});
  }catch(e){}
}

function showMap(address){
  if(!address) return;
  let enc = encodeURIComponent(address);
  document.getElementById("mapBox").innerHTML = `
    <div class="card-title">📍 Location Map</div>
    <iframe width="100%" height="280"
    src="https://maps.google.com/maps?q=${enc}&z=14&output=embed">
    </iframe>`;
}

const params = new URLSearchParams(window.location.search);
const num = params.get("num");

async function start(){
  await type("> Initializing trace system...");
  await type("> Validating number: " + num);
  await type("> Connecting to database...");
  await new Promise(r => setTimeout(r, 800));

  try{
    let res = await fetch(`https://yash-code-with-ai.alphamovies.workers.dev/?num=${encodeURIComponent(num)}&key=7189814021`);
    let json = await res.json();

    let data = json.data && json.data[0];

    if(!data){
      await type("> ❌ No data found for this number");
      addDataField("Status", "No results found");
      return;
    }

    await type("> ✓ Data retrieved successfully");
    await type("> Parsing information...");
    await new Promise(r => setTimeout(r, 600));

    addDataField("📱 Mobile Number", data.mobile || "N/A");
    await type("> Mobile: " + (data.mobile || "N/A"));
    await new Promise(r => setTimeout(r, 200));

    addDataField("👤 Full Name", data.name || "N/A");
    await type("> Name: " + (data.name || "N/A"));
    await new Promise(r => setTimeout(r, 200));

    addDataField("🆔 ID Number", data.id_number || "N/A");
    await type("> ID: " + (data.id_number || "N/A"));
    await new Promise(r => setTimeout(r, 200));

    addDataField("👨 Father's Name", data.father_name || "N/A");
    await type("> Father: " + (data.father_name || "N/A"));
    await new Promise(r => setTimeout(r, 200));

    addDataField("📡 Circle", data.circle || "N/A");
    await type("> Circle: " + (data.circle || "N/A"));
    await new Promise(r => setTimeout(r, 200));

    addDataField("📍 Address", data.address || "N/A");
    await type("> Address: " + (data.address || "N/A"));
    await new Promise(r => setTimeout(r, 400));

    await type("> Locating on map...");
    await new Promise(r => setTimeout(r, 800));
    showMap(data.address);

    await type("> ✓ Trace complete!");
    await new Promise(r => setTimeout(r, 400));
    playFinalSound();

  }catch(e){
    console.error(e);
    await type("> ❌ Error: Unable to fetch data");
    addDataField("Status", "Error fetching information");
  }
}

start();

</script>

</body>
</html>
