<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trace Result</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#000;
  color:#00ffcc;
  font-family:monospace;
  text-align:center;
  padding:20px;
}

h1{
  text-shadow:0 0 20px #00ffcc;
}

#terminal{
  margin-top:20px;
  text-align:left;
  max-width:420px;
  margin:auto;
  border:1px solid #00ffcc;
  padding:15px;
  height:280px;
  overflow-y:auto;
  box-shadow:0 0 25px #00ffcc;
}

#mapBox{
  margin-top:15px;
  max-width:420px;
  margin:auto;
}

.footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<h1>⚡ TRACE RESULT ⚡</h1>

<div id="terminal">> Loading...</div>

<div id="mapBox"></div>

<div class="footer">
This is for educational purpose only. Not to harm anyone.<br>
Developed by Satyam Gupta ⚡
</div>

<audio id="successAudio" src="success.mp3"></audio>

<script>

// TYPE EFFECT
async function type(text){
  const term=document.getElementById("terminal");

  let color="#00ffcc";
  if(text.includes("Name")||text.includes("Number")) color="#00ff00";
  if(text.includes("ID")) color="red";

  term.innerHTML+=`<span style="color:${color}">${text}</span><br>`;
  term.scrollTop=term.scrollHeight;

  await new Promise(r=>setTimeout(r,80));
}

// SOUND
function playFinalSound(){
  let audio=document.getElementById("successAudio");
  audio.currentTime=0;
  audio.play().catch(()=>{});
}

// MAP
function showMap(address){
  if(!address) return;

  let enc=encodeURIComponent(address);

  document.getElementById("mapBox").innerHTML=`
    <iframe width="100%" height="220"
    style="border-radius:10px;border:none;"
    src="https://maps.google.com/maps?q=${enc}&z=14&output=embed">
    </iframe>`;
}

// GET NUMBER
const params=new URLSearchParams(window.location.search);
const num=params.get("num");

// MAIN
async function start(){

  await type("> Initializing...");
  await type("> Processing number: "+num);
  await type("> Connecting to secure server...");
  await new Promise(r=>setTimeout(r,800));

  try{

    // 🔥 NEW API
    let res = await fetch(`https://yash-code-with-ai.alphamovies.workers.dev/?num=${num}&key=7189814021`);
    let json = await res.json();

    let data = json.data && json.data[0];

    if(!data){
      await type("> No data found ❌");
      return;
    }

    await type("> Data Retrieved Successfully\n");

    await type("📱 Number: "+(data.mobile||"N/A"));
    await new Promise(r=>setTimeout(r,200));

    await type("🆔 ID: "+(data.id_number||"N/A"));
    await new Promise(r=>setTimeout(r,250));

    await type("👤 Name: "+(data.name||"N/A"));
    await new Promise(r=>setTimeout(r,300));

    await type("👨 Father: "+(data.father_name||"N/A"));
    await new Promise(r=>setTimeout(r,250));

    await type("📡 Circle: "+(data.circle||"N/A"));
    await new Promise(r=>setTimeout(r,250));

    await type("📍 Address: "+(data.address||"N/A"));
    await new Promise(r=>setTimeout(r,400));

    await type("----------------------");

    await type("> Locating address...");
    await new Promise(r=>setTimeout(r,800));
    showMap(data.address);

    await new Promise(r=>setTimeout(r,600));
    playFinalSound();

  }catch(e){
    console.log(e);
    await type("> Error fetching data ❌");
  }
}

start();

</script>

</body>
</html>
